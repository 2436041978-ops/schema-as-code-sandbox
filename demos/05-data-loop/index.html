<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>05 数据流动闭环 — DFD 数据流图</title>
    <style>
        :root {
            --cp-blue: #1565c0;
            --cp-bg: #e3f2fd;
            --dp-orange: #ef6c00;
            --dp-bg: #fff3e0;
            --infra-purple: #6a1b9a;
            --infra-bg: #f3e5f5;
            --success: #4caf50;
            --bg: #f5f7fa;
            --card: #ffffff;
            --border: #e0e6ed;
            --text: #1a1a2e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 20px;
            color: var(--text);
            margin-bottom: 8px;
        }

        .header p {
            font-size: 13px;
            color: #666;
        }

        .back {
            display: inline-block;
            margin-bottom: 16px;
            color: #666;
            text-decoration: none;
            font-size: 13px;
        }

        /* DFD 画布 */
        .dfd-wrapper {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .dfd-container {
            position: relative;
            flex: 1;
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1000 / 700;
            min-height: 500px;
        }

        .dfd-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .dfd-svg path {
            fill: none;
            stroke: #ccc;
            stroke-width: 2;
            marker-end: url(#arrowhead);
            transition: stroke 0.3s;
        }

        .dfd-svg path.active {
            stroke: var(--dp-orange);
            stroke-width: 3;
            marker-end: url(#arrowhead-active);
        }

        .dfd-svg path.loop {
            stroke: var(--success);
            stroke-dasharray: 8, 4;
        }

        .dfd-svg path.loop.active {
            stroke: var(--success);
            stroke-width: 3;
        }

        .flow-label {
            font-size: 10px;
            fill: #666;
            font-family: sans-serif;
            background: white;
        }

        .flow-label-bg {
            fill: white;
            opacity: 0.9;
        }

        /* 节点 */
        .node {
            position: absolute;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 11px;
            transition: all 0.3s;
            cursor: default;
        }

        .node.active {
            transform: scale(1.08);
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
            z-index: 10;
        }

        /* 外部实体：矩形 */
        .external-entity {
            background: var(--cp-bg);
            border: 2px solid var(--cp-blue);
            border-radius: 2px;
            color: var(--cp-blue);
        }

        /* 过程：圆角矩形 */
        .process {
            background: var(--dp-bg);
            border: 2px solid var(--dp-orange);
            border-radius: 12px;
            color: var(--dp-orange);
        }

        /* 数据存储：开口矩形 */
        .data-store {
            background: var(--infra-bg);
            border: 2px solid var(--infra-purple);
            border-left: none;
            color: var(--infra-purple);
            position: relative;
        }

        .data-store::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 10%;
            border-left: 2px solid var(--infra-purple);
            border-right: 2px solid var(--infra-purple);
        }

        .node-title {
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 2px;
        }

        .node-sub {
            font-size: 10px;
            opacity: 0.8;
        }

        /* 控制面板 */
        .control-panel {
            width: 280px;
            flex-shrink: 0;
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .control-panel h3 {
            font-size: 14px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border);
        }

        .buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        button {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .btn-play {
            background: var(--success);
            color: white;
        }

        .btn-play:hover {
            background: #388e3c;
        }

        .btn-step {
            background: var(--cp-blue);
            color: white;
        }

        .btn-step:hover {
            background: #0d47a1;
        }

        .btn-reset {
            background: #666;
            color: white;
        }

        .btn-reset:hover {
            background: #444;
        }

        .log-panel {
            flex: 1;
            background: #1a1a2e;
            border-radius: 6px;
            padding: 12px;
            overflow-y: auto;
            max-height: 400px;
        }

        .log-title {
            color: #666;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
        }

        .log-line {
            font-family: "SF Mono", Monaco, monospace;
            font-size: 11px;
            line-height: 1.8;
            color: #a6e22e;
            padding-left: 8px;
            border-left: 2px solid transparent;
        }

        .log-line.ready { color: #66d9ef; }
        .log-line.process { color: #fd971f; }
        .log-line.success { color: #a6e22e; border-left-color: var(--success); }
        .log-line.loop { color: #e6db74; border-left-color: var(--success); }

        .legend {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            margin-bottom: 6px;
            color: #666;
        }

        .legend-box {
            width: 16px;
            height: 12px;
            border-radius: 2px;
            border: 2px solid;
        }

        .legend-box.ee { background: var(--cp-bg); border-color: var(--cp-blue); }
        .legend-box.proc { background: var(--dp-bg); border-color: var(--dp-orange); border-radius: 4px; }
        .legend-box.ds { background: var(--infra-bg); border-color: var(--infra-purple); }

        @media (max-width: 1024px) {
            .dfd-wrapper { flex-direction: column; }
            .control-panel { width: 100%; }
        }
    </style>
</head>
<body>
    <a class="back" href="../../">← 返回沙盘首页</a>
    
    <div class="header">
        <h1>05 数据流动闭环 — DFD 数据流图</h1>
        <p>从控制平面声明到运行时拦截，再到观测反哺的完整数据流闭环</p>
    </div>

    <div class="dfd-wrapper">
        <div class="dfd-container" id="dfd-canvas">
            <svg class="dfd-svg" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet">
                <defs>
                    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#ccc" />
                    </marker>
                    <marker id="arrowhead-active" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#ef6c00" />
                    </marker>
                    <marker id="arrowhead-loop" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#4caf50" />
                    </marker>
                </defs>

                <!-- 数据流路径 -->
                <!-- F1: 控制平面 → Registry -->
                <path id="path-f1" d="M 190 345 L 250 115" />
                <!-- F2: Registry → Compiler -->
                <path id="path-f2" d="M 390 115 L 450 115" />
                <!-- F3: Compiler → 产物存储 -->
                <path id="path-f3" d="M 520 150 L 520 250" />
                <!-- F4-8: 产物存储 → L1-L5 -->
                <path id="path-f4" d="M 480 320 L 230 580" />
                <path id="path-f5" d="M 490 320 L 340 580" />
                <path id="path-f6" d="M 500 320 L 450 580" />
                <path id="path-f7" d="M 510 320 L 560 580" />
                <path id="path-f8" d="M 520 320 L 670 580" />
                <!-- F9: L3 → Runtime -->
                <path id="path-f9" d="M 490 580 L 620 485" />
                <!-- F10: Runtime → Validator -->
                <path id="path-f10" d="M 690 450 L 690 350" />
                <!-- F11: Validator → Bridge -->
                <path id="path-f11" d="M 760 315 L 850 115" />
                <!-- F12: Bridge → 观测日志 -->
                <path id="path-f12" d="M 920 150 L 920 250" />
                <!-- F13: Bridge → 控制平面（闭环） -->
                <path id="path-f13" class="loop" d="M 850 115 C 600 20 200 80 190 300" />

                <!-- 流标签 -->
                <rect class="flow-label-bg" x="200" y="220" width="70" height="16" rx="3" />
                <text class="flow-label" x="235" y="232" text-anchor="middle">YAML声明</text>

                <rect class="flow-label-bg" x="390" y="95" width="80" height="16" rx="3" />
                <text class="flow-label" x="430" y="107" text-anchor="middle">版本+影响面</text>

                <rect class="flow-label-bg" x="525" y="190" width="70" height="16" rx="3" />
                <text class="flow-label" x="560" y="202" text-anchor="middle">编译产物</text>

                <rect class="flow-label-bg" x="330" y="440" width="70" height="16" rx="3" />
                <text class="flow-label" x="365" y="452" text-anchor="middle">规则下渗</text>

                <rect class="flow-label-bg" x="550" y="520" width="70" height="16" rx="3" />
                <text class="flow-label" x="585" y="532" text-anchor="middle">运行时事件</text>

                <rect class="flow-label-bg" x="700" y="390" width="70" height="16" rx="3" />
                <text class="flow-label" x="735" y="402" text-anchor="middle">推演请求</text>

                <rect class="flow-label-bg" x="780" y="200" width="70" height="16" rx="3" />
                <text class="flow-label" x="815" y="212" text-anchor="middle">推演结果</text>

                <rect class="flow-label-bg" x="925" y="190" width="70" height="16" rx="3" />
                <text class="flow-label" x="960" y="202" text-anchor="middle">记录漂移</text>

                <rect class="flow-label-bg" x="400" y="60" width="80" height="16" rx="3" />
                <text class="flow-label" x="440" y="72" text-anchor="middle" fill="#4caf50">自动PR反哺</text>
            </svg>

            <!-- 节点 -->
            <div class="node external-entity" id="cp" style="left:5%; top:42.8%; width:14%; height:12.8%;">
                <div class="node-title">控制平面</div>
                <div class="node-sub">intent-schema-compiler</div>
            </div>

            <div class="node process" id="registry" style="left:25%; top:11.4%; width:14%; height:10%;">
                <div class="node-title">Registry</div>
                <div class="node-sub">语义注册表</div>
            </div>

            <div class="node process" id="compiler" style="left:45%; top:11.4%; width:14%; height:10%;">
                <div class="node-title">Compiler</div>
                <div class="node-sub">契约编译器</div>
            </div>

            <div class="node data-store" id="store" style="left:45%; top:35.7%; width:14%; height:10%;">
                <div class="node-title" style="margin-left:8px;">产物存储</div>
                <div class="node-sub" style="margin-left:8px;">编译产物</div>
            </div>

            <div class="node external-entity" id="l1" style="left:18%; top:82.8%; width:9%; height:7.1%;">
                <div class="node-title">L1</div>
                <div class="node-sub">Token</div>
            </div>

            <div class="node external-entity" id="l2" style="left:29%; top:82.8%; width:9%; height:7.1%;">
                <div class="node-title">L2</div>
                <div class="node-sub">组件</div>
            </div>

            <div class="node external-entity" id="l3" style="left:40%; top:82.8%; width:9%; height:7.1%;">
                <div class="node-title">L3</div>
                <div class="node-sub">API</div>
            </div>

            <div class="node external-entity" id="l4" style="left:51%; top:82.8%; width:9%; height:7.1%;">
                <div class="node-title">L4</div>
                <div class="node-sub">容器</div>
            </div>

            <div class="node external-entity" id="l5" style="left:62%; top:82.8%; width:9%; height:7.1%;">
                <div class="node-title">L5</div>
                <div class="node-sub">DB/LLM</div>
            </div>

            <div class="node process" id="runtime" style="left:62%; top:64.2%; width:14%; height:10%;">
                <div class="node-title">Runtime</div>
                <div class="node-sub">运行时拦截</div>
            </div>

            <div class="node process" id="validator" style="left:62%; top:40%; width:14%; height:10%;">
                <div class="node-title">Validator</div>
                <div class="node-sub">四层推演</div>
            </div>

            <div class="node process" id="bridge" style="left:85%; top:11.4%; width:14%; height:10%;">
                <div class="node-title">Bridge</div>
                <div class="node-sub">观测桥接器</div>
            </div>

            <div class="node data-store" id="obs-log" style="left:85%; top:35.7%; width:14%; height:10%;">
                <div class="node-title" style="margin-left:8px;">观测日志</div>
                <div class="node-sub" style="margin-left:8px;">漂移记录</div>
            </div>
        </div>

        <div class="control-panel">
            <h3>▶️ 演示控制</h3>
            <div class="buttons">
                <button class="btn-play" onclick="dfd.play()">播放</button>
                <button class="btn-step" onclick="dfd.step()">单步</button>
                <button class="btn-reset" onclick="dfd.reset()">重置</button>
            </div>
            
            <div class="log-panel" id="log-panel">
                <div class="log-title">执行日志</div>
                <div id="log-content">
                    <div class="log-line ready">就绪。点击"播放"开始数据流闭环演示。</div>
                </div>
            </div>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-box ee"></div>
                    <span>外部实体（现有系统/控制平面）</span>
                </div>
                <div class="legend-item">
                    <div class="legend-box proc"></div>
                    <span>过程（数据平面模块）</span>
                </div>
                <div class="legend-item">
                    <div class="legend-box ds"></div>
                    <span>数据存储（产物/日志）</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dfd = {
            steps: [
                { path: 'path-f1', from: 'cp', to: 'registry', msg: '【声明式同步】控制平面 YAML 变更 → Registry 拉取最新意图协议', type: 'process' },
                { path: 'path-f2', from: 'registry', to: 'compiler', msg: '【版本管理】Registry 分析影响面 → Compiler 获取版本化语义契约', type: 'process' },
                { path: 'path-f3', from: 'compiler', to: 'store', msg: '【契约编译】YAML → TS 类型 / ESLint 规则 / OpenAPI 扩展 / OPA Policy', type: 'success' },
                { path: 'path-f4', from: 'store', to: 'l1', msg: '【规则下渗·L1】Token 产物：CSS 变量 + 语义注释注入 Ant Design', type: 'success' },
                { path: 'path-f5', from: 'store', to: 'l2', msg: '【规则下渗·L2】组件产物：Props 类型约束 + ESLint 规则注入 React', type: 'success' },
                { path: 'path-f6', from: 'store', to: 'l3', msg: '【规则下渗·L3】API 产物：OpenAPI 扩展字段 x-intent-binding', type: 'success' },
                { path: 'path-f7', from: 'store', to: 'l4', msg: '【规则下渗·L4】容器产物：OPA Policy / WASM 配置注入 Envoy', type: 'success' },
                { path: 'path-f8', from: 'store', to: 'l5', msg: '【规则下渗·L5】DB 产物：DDL 注释 + CHECK 约束', type: 'success' },
                { path: 'path-f9', from: 'l3', to: 'runtime', msg: '【运行时事件】API 层触发 Runtime 守卫 → 校验请求语义', type: 'process' },
                { path: 'path-f10', from: 'runtime', to: 'validator', msg: '【四层推演】Runtime 提交推演请求 → 语法/语义/安全/美感安检', type: 'process' },
                { path: 'path-f11', from: 'validator', to: 'bridge', msg: '【推演结果】Validator 返回 BLOCK/PASS → Bridge 记录事件', type: 'success' },
                { path: 'path-f12', from: 'bridge', to: 'obs-log', msg: '【观测记录】Bridge 写入漂移事件到观测日志（同义词替代/置信度波动）', type: 'success' },
                { path: 'path-f13', from: 'bridge', to: 'cp', msg: '【闭环反哺】Bridge 归因分析 → 自动创建 Registry PR → 收紧同义词规则 → 下一周期', type: 'loop' }
            ],
            
            current: 0,
            isPlaying: false,

            log(msg, type = 'info') {
                const panel = document.getElementById('log-content');
                const line = document.createElement('div');
                line.className = `log-line ${type}`;
                line.textContent = msg;
                panel.appendChild(line);
                panel.scrollTop = panel.scrollHeight;
            },

            reset() {
                this.current = 0;
                this.isPlaying = false;
                document.querySelectorAll('.active').forEach(el => el.classList.remove('active'));
                document.getElementById('log-content').innerHTML = '<div class="log-line ready">就绪。点击"播放"开始数据流闭环演示。</div>';
            },

            async play() {
                if (this.isPlaying) return;
                this.isPlaying = true;
                this.reset();
                
                for (let i = 0; i < this.steps.length; i++) {
                    await this.runStep(i);
                    if (!this.isPlaying) break;
                    await this.sleep(800);
                }
                
                if (this.isPlaying) {
                    this.log('🎉 数据流闭环演示完成。控制平面 → 数据平面 → 基础设施 → 观测 → 反哺 → 控制平面。', 'loop');
                }
                this.isPlaying = false;
            },

            async step() {
                if (this.current >= this.steps.length) {
                    this.reset();
                    return;
                }
                await this.runStep(this.current++);
            },

            async runStep(idx) {
                const s = this.steps[idx];
                
                // 高亮路径
                const path = document.getElementById(s.path);
                if (path) path.classList.add('active');
                
                // 高亮节点
                document.getElementById(s.from)?.classList.add('active');
                document.getElementById(s.to)?.classList.add('active');
                
                // 日志
                this.log(s.msg, s.type);
                
                // 数据包动画
                await this.animatePacket(s.path);
                
                // 取消高亮（保留路径短暂时间）
                setTimeout(() => {
                    document.getElementById(s.from)?.classList.remove('active');
                    document.getElementById(s.to)?.classList.remove('active');
                    if (path) path.classList.remove('active');
                }, 600);
            },

            animatePacket(pathId) {
                return new Promise(resolve => {
                    const path = document.getElementById(pathId);
                    if (!path) { resolve(); return; }
                    
                    const svg = document.querySelector('.dfd-svg');
                    const length = path.getTotalLength();
                    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.setAttribute('r', '5');
                    circle.setAttribute('fill', pathId === 'path-f13' ? '#4caf50' : '#ef6c00');
                    circle.setAttribute('opacity', '0.9');
                    svg.appendChild(circle);
                    
                    const duration = 800;
                    let start = null;
                    
                    const step = (timestamp) => {
                        if (!start) start = timestamp;
                        const progress = Math.min((timestamp - start) / duration, 1);
                        const point = path.getPointAtLength(progress * length);
                        circle.setAttribute('cx', point.x);
                        circle.setAttribute('cy', point.y);
                        
                        if (progress < 1) {
                            requestAnimationFrame(step);
                        } else {
                            circle.remove();
                            resolve();
                        }
                    };
                    
                    requestAnimationFrame(step);
                });
            },

            sleep(ms) {
                return new Promise(r => setTimeout(r, ms));
            }
        };
    </script>
</body>
</html>
